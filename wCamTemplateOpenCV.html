<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebCam Video in OpenCV.js (Problems 1-3)</title>
  <style>
    #videoInput, #canvasOutput {
      border: 1px solid black;
    }
    #controlPanel { margin-top: 12px; }
  </style>
</head>
<body>
<h2>WebCam Video in OpenCV.js (Problems 1-3)</h2>
<p>OpenCV.js must be loaded from opencv.js for this to work</p>

<div>
  <video id="videoInput"></video> 
  <canvas id="canvasOutput"></canvas>
</div>

<div id="controlPanel">
  <h3>Controls</h3>
  <!-- Toggle grayscale? -->
  <label for="grayCheck">Grayscale?</label>
  <input type="checkbox" id="grayCheck"/>

  <!-- Problem 1: 3x3 convolution filter -->
  <br><br>
  <label for="convSelect">3x3 Convolution Filter:</label>
  <select id="convSelect">
    <option value="none">None</option>
    <option value="blur">Blur</option>
    <option value="sharpen">Sharpen</option>
    <option value="edge">Edge Detect</option>
    <option value="sobelX">Sobel X</option>
    <option value="sobelY">Sobel Y</option>
    <option value="prewittX">Prewitt X</option>
    <option value="prewittY">Prewitt Y</option>
    <option value="emboss">Emboss</option>
  </select>

  <!-- Problem 2: Threshold type and slider -->
  <br><br>
  <label for="threshSelect">Threshold Type:</label>
  <select id="threshSelect">
    <option value="none">None</option>
    <option value="binary">Binary</option>
    <option value="binaryInv">Binary Inverted</option>
    <option value="otsu">OTSU</option>
    <option value="adaptiveMean">Adaptive Mean</option>
    <option value="adaptiveGaussian">Adaptive Gaussian</option>
  </select>
  <br>
  <label for="threshRange">Threshold Value:</label>
  <input type="range" id="threshRange" min="0" max="255" value="127" />
  <span id="threshValueLabel">127</span>

  <!-- Problem 3: Gaussian blur -->
  <br><br>
  <label for="ksizeRange">Gaussian ksize [5..25]:</label>
  <input type="range" id="ksizeRange" min="5" max="25" step="2" value="5"/>
  <span id="ksizeLabel">5</span>
  <br>
  <label for="sigmaRange">Sigma [0..10]:</label>
  <input type="range" id="sigmaRange" min="0" max="10" step="1" value="0"/>
  <span id="sigmaLabel">0</span>

</div>

<script type="text/javascript" src="opencv.js"></script>
<script type="text/javascript" src="wCamTemplateOpenCV.js"></script>
</body>
</html>
