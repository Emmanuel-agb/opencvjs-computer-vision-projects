<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Canny Edge Detection</title>
 <style>
  /* Container rows & columns */
  .row {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap; /* wrap if needed */
    margin-bottom: 12px;
  }
  .column {
    display: flex;
    flex-direction: column;
    margin-right: 20px;
  }

  /* Constrain image and canvas to a comfortable size */
  img, canvas {
    max-width: 300px; /* adjust as needed */
    height: auto;     /* keep aspect ratio */
    border: 1px solid #333;
    margin-bottom: 8px;
  }

  #controlPanel {
    margin-top: 12px;
  }
  </style>
</head>
<body>
<h2>Canny Edge Detection</h2>
<p id="status">OpenCV.js is loading...</p>
<div>
  <img id="imageSrc" alt="No Image" />
  <div class="caption">imageSrc <input type="file" id="fileInput" name="file"/></div>
</div>
<div>
  <canvas id="canvasOutput"></canvas>
  <div class="caption">canvasOutput</div>
</div>
<div>
  Threshold1: <input type="range" id="threshold1" min="1" max="500" value="100">
  Threshold2: <input type="range" id="threshold2" min="1" max="500" value="200">
  Aperture Size: <input type="range" id="apertureSize" min="3" max="7" step="2" value="3">
  <button onclick="applyCannyEdge()">Apply Canny Edge</button>
</div>

<script type="text/javascript" src="opencv.js"></script>
<script type="text/javascript" src="cannyEdge.js"></script>
</body>
</html>
